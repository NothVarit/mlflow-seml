services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 5s
      retries: 5
    ports:
      - "5435:5432"

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    user: root
    environment:
      - MLFLOW_FLASK_SERVER_SECRET_KEY=capstone2025
      - GUNICORN_CMD_ARGS=--timeout 120 --forwarded-allow-ips="*"
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    command: >
      mlflow server
      --backend-store-uri postgresql://admin:admin@postgres:5432/mlflow
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlruns
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
      --cors-allowed-origins "*"
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW_UID: 50000
      PYTHONPATH: /opt/airflow/project
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REFERENCE_DATA_PATH: /opt/airflow/project/data/medium_articles.csv
      CURRENT_DATA_PATH: /opt/airflow/project/data/medium_articles.csv
      REFERENCE_PREDICTIONS_PATH: /opt/airflow/project/data/reference_predictions.csv
      CURRENT_PREDICTIONS_PATH: /opt/airflow/project/data/current_predictions.csv
      OOV_HISTORY_PATH: /opt/airflow/project/data/oov_history.csv
      CTR_HISTORY_PATH: /opt/airflow/project/data/ctr_history.csv
      CURRENT_FEEDBACK_PATH: /opt/airflow/project/data/current_feedback.csv
      MODEL_DIR: /opt/airflow/project/distilbert_tagging_model
      DRIFT_REPORT_DIR: /opt/airflow/project/reports
    command: >
      bash -c "airflow db migrate &&
      (airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email airflow@example.com || true)"
    volumes:
      - ./:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW_UID: 50000
      PYTHONPATH: /opt/airflow/project
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REFERENCE_DATA_PATH: /opt/airflow/project/data/medium_articles.csv
      CURRENT_DATA_PATH: /opt/airflow/project/data/medium_articles.csv
      REFERENCE_PREDICTIONS_PATH: /opt/airflow/project/data/reference_predictions.csv
      CURRENT_PREDICTIONS_PATH: /opt/airflow/project/data/current_predictions.csv
      OOV_HISTORY_PATH: /opt/airflow/project/data/oov_history.csv
      CTR_HISTORY_PATH: /opt/airflow/project/data/ctr_history.csv
      CURRENT_FEEDBACK_PATH: /opt/airflow/project/data/current_feedback.csv
      MODEL_DIR: /opt/airflow/project/distilbert_tagging_model
      DRIFT_REPORT_DIR: /opt/airflow/project/reports
    command: webserver
    volumes:
      - ./:/opt/airflow/project
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW_UID: 50000
      PYTHONPATH: /opt/airflow/project
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REFERENCE_DATA_PATH: /opt/airflow/project/data/medium_articles.csv
      CURRENT_DATA_PATH: /opt/airflow/project/data/medium_articles.csv
      REFERENCE_PREDICTIONS_PATH: /opt/airflow/project/data/reference_predictions.csv
      CURRENT_PREDICTIONS_PATH: /opt/airflow/project/data/current_predictions.csv
      OOV_HISTORY_PATH: /opt/airflow/project/data/oov_history.csv
      CTR_HISTORY_PATH: /opt/airflow/project/data/ctr_history.csv
      CURRENT_FEEDBACK_PATH: /opt/airflow/project/data/current_feedback.csv
      MODEL_DIR: /opt/airflow/project/distilbert_tagging_model
      DRIFT_REPORT_DIR: /opt/airflow/project/reports
    command: scheduler
    volumes:
      - ./:/opt/airflow/project
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: article-tagger-api
    ports:
      - "${API_PORT:-8001}:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_URI=models:/DistilBERT_Tagger@production
      - MODEL_FALLBACK_URI=models:/DistilBERT_Tagger/latest
    depends_on:
      - mlflow

volumes:
  postgres_data:
